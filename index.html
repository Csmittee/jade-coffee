<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jade Coffee · Taste of heaven</title>
    
    <meta name="description" content="Premium coffee capsules — smooth blends for every moment">
    <meta property="og:title" content="Jade Coffee">
    <meta property="og:description" content="Our capsule coffee is coming soon!">
    <meta property="og:image" content="https://res.cloudinary.com/dfiomi0lb/image/upload/v1773774149/Jade-logo-original.png">
    <meta property="og:url" content="https://jade.janishammer.com">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- INJECTORS -->
    <script src="https://assets.janishammer.com/js/injector-core.js"></script>
    <script src="https://assets.janishammer.com/js/injector-config.js"></script>
    
    <style>
        /* No body background override – let injector handle it */
        
        .hero {
            min-height: 70vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 4rem 2rem;
        }
        
        .hero-logo {
            max-width: 400px;
            width: 100%;
            margin-bottom: 2rem;
            transition: transform 0.3s ease;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.2));
        }
        
        .hero-logo:hover {
            transform: scale(1.02) translateY(-4px);
        }
        
        .hero h1 {
            font-size: 2.8rem;
            font-weight: 700;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 1rem;
        }
        
        .hero h2 {
            font-size: 1.4rem;
            color: rgba(255,255,255,0.9);
            font-weight: 500;
            max-width: 600px;
        }
        
        .products-section {
            max-width: 1280px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }
        
        .section-title {
            text-align: center;
            font-size: 2.2rem;
            color: #fff;
            margin-bottom: 2.5rem;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }
        
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }
        
        .product-card {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            padding: 2rem;
            text-align: center;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.3);
        }
        
        .product-card:hover {
            transform: translateY(-8px);
            background: white;
            box-shadow: 0 20px 30px rgba(0,0,0,0.2);
        }
        
        .product-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        
        .product-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: #6F4E37;
            margin-bottom: 0.5rem;
        }
        
        .product-desc {
            color: #666;
            margin-bottom: 1rem;
            line-height: 1.4;
        }
        
        .product-price {
            font-size: 1.5rem;
            font-weight: 800;
            color: #A67B5B;
            margin-bottom: 1rem;
        }
        
        .product-price::before {
            content: "฿";
            font-size: 1.2rem;
        }
        
        .product-button {
            background: linear-gradient(135deg, #6F4E37, #A67B5B);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }
        
        .product-button:hover {
            transform: scale(1.02);
            background: linear-gradient(135deg, #A67B5B, #C4A484);
        }
        
        @media (max-width: 768px) {
            .hero h1 { font-size: 2rem; }
            .hero h2 { font-size: 1.1rem; }
            .product-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <section class="hero">
        <img src="https://res.cloudinary.com/dfiomi0lb/image/upload/v1773774149/Jade-logo-original.png" 
             alt="Jade Coffee" 
             class="hero-logo">
        <h1>Our capsule coffee is coming soon!</h1>
        <h2>The taste that you love every day</h2>
    </section>

    <section class="products-section">
        <h2 class="section-title">Our Collection</h2>
        <div class="product-grid">
            <div class="product-card">
                <div class="product-icon">☕</div>
                <h3 class="product-title">Morning Blend</h3>
                <p class="product-desc">Smooth, balanced · Notes of chocolate and nuts</p>
                <div class="product-price">450</div>
                <button class="product-button">Pre-order</button>
            </div>
            <div class="product-card">
                <div class="product-icon">🌄</div>
                <h3 class="product-title">Espresso Intenso</h3>
                <p class="product-desc">Rich and bold · Perfect for milk drinks</p>
                <div class="product-price">480</div>
                <button class="product-button">Pre-order</button>
            </div>
            <div class="product-card">
                <div class="product-icon">🍫</div>
                <h3 class="product-title">Decaf Harmony</h3>
                <p class="product-desc">Full flavor, zero caffeine · Evening favorite</p>
                <div class="product-price">420</div>
                <button class="product-button">Pre-order</button>
            </div>
        </div>
    </section>
</body>
</html>
